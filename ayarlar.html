<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ayarlar – AkaToon</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0d0d0f; --bg2: #141418; --bg3: #1c1c22; --border: #2a2a35; --red: #e8192c; --red-dark: #b01020; --text: #e8e8f0; --muted: #888899; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }
    a { color: inherit; text-decoration: none; }
    nav { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; }
    .logo { font-family: 'Bebas Neue'; font-size: 26px; } .logo span { color: var(--red); }
    .container { max-width: 600px; margin: 40px auto; padding: 0 24px; }
    h1 { font-family: 'Bebas Neue'; font-size: 36px; margin-bottom: 28px; }
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 20px; }
    .card h2 { font-size: 16px; font-weight: 700; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .avatar-section { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
    .avatar-big { width: 72px; height: 72px; border-radius: 50%; background: var(--red); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 700; flex-shrink: 0; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
    .form-group input { width: 100%; background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 8px; font-size: 14px; outline: none; }
    .form-group input:focus { border-color: var(--red); }
    .form-group input:disabled { opacity: .5; cursor: not-allowed; }
    .btn { padding: 10px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; }
    .btn-primary { background: var(--red); color: #fff; }
    .btn-primary:hover { background: var(--red-dark); }
    .btn-danger { background: rgba(232,25,44,0.1); color: var(--red); border: 1px solid rgba(232,25,44,0.3); }
    .msg { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-top: 12px; display: none; }
    .msg.success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #4ade80; display: block; }
    .msg.error { background: rgba(232,25,44,0.1); border: 1px solid rgba(232,25,44,0.3); color: #ff6b7a; display: block; }
    #loading { text-align: center; padding: 60px; color: var(--muted); }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="logo"><span>Aka</span>Toon</a>
    <span style="color:var(--muted);font-size:14px">/ Ayarlar</span>
  </nav>

  <div id="loading">Yükleniyor...</div>

  <div class="container" id="content" style="display:none">
    <h1>⚙️ Hesap Ayarları</h1>

    <div class="card">
      <h2>👤 Profil Bilgileri</h2>
      <div class="avatar-section">
        <div class="avatar-big" id="avatarBig">?</div>
        <div>
          <div style="font-weight:600" id="displayName">Kullanıcı</div>
          <div style="color:var(--muted);font-size:13px" id="displayEmail"></div>
        </div>
      </div>
      <div class="form-group">
        <label>Kullanıcı Adı</label>
        <input type="text" id="username" placeholder="kullaniciadi" />
      </div>
      <div class="form-group">
        <label>E-posta (değiştirilemez)</label>
        <input type="email" id="email" disabled />
      </div>
      <button class="btn btn-primary" onclick="profilGuncelle()">Kaydet</button>
      <div class="msg" id="profilMsg"></div>
    </div>

    <div class="card">
      <h2>🔒 Şifre Değiştir</h2>
      <div class="form-group">
        <label>Yeni Şifre</label>
        <input type="password" id="yeniSifre" placeholder="En az 6 karakter" />
      </div>
      <div class="form-group">
        <label>Şifre Tekrar</label>
        <input type="password" id="yeniSifreTekrar" placeholder="Şifreyi tekrar girin" />
      </div>
      <button class="btn btn-primary" onclick="sifreDegistir()">Şifreyi Güncelle</button>
      <div class="msg" id="sifreMsg"></div>
    </div>

    <div class="card">
      <h2>🚪 Oturumu Kapat</h2>
      <p style="color:var(--muted);font-size:14px;margin-bottom:16px">Hesabından çıkış yapmak için aşağıdaki butona tıkla.</p>
      <button class="btn btn-danger" onclick="cikisYap()">Çıkış Yap</button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://wxfmatafacdjhiurowut.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind4Zm1hdGFmYWNkamhpdXJvd3V0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMzc0NzgsImV4cCI6MjA5NzcxMzQ3OH0.3uLH8fQ-FrCJ-gdPNEY5Zi56F8fBuVUCdVTrEK7zoZE';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
    let currentUser = null;

    async function init() {
      const { data: { user } } = await sb.auth.getUser();
      if (!user) { window.location.href = 'giris.html'; return; }
      currentUser = user;

      const username = user.user_metadata?.username || '';
      const email = user.email;
      const initial = (username || email)[0].toUpperCase();

      document.getElementById('avatarBig').textContent = initial;
      document.getElementById('displayName').textContent = username || 'Kullanıcı';
      document.getElementById('displayEmail').textContent = email;
      document.getElementById('username').value = username;
      document.getElementById('email').value = email;

      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';
    }

    async function profilGuncelle() {
      const username = document.getElementById('username').value.trim();
      if (!username) { showMsg('profilMsg', 'error', 'Kullanıcı adı boş olamaz!'); return; }

      const { error } = await sb.auth.updateUser({ data: { username } });
      if (error) { showMsg('profilMsg', 'error', 'Hata: ' + error.message); }
      else {
        showMsg('profilMsg', 'success', '✅ Profil güncellendi!');
        document.getElementById('displayName').textContent = username;
        document.getElementById('avatarBig').textContent = username[0].toUpperCase();
      }
    }

    async function sifreDegistir() {
      const sifre = document.getElementById('yeniSifre').value;
      const tekrar = document.getElementById('yeniSifreTekrar').value;
      if (sifre.length < 6) { showMsg('sifreMsg', 'error', 'Şifre en az 6 karakter olmalı!'); return; }
      if (sifre !== tekrar) { showMsg('sifreMsg', 'error', 'Şifreler eşleşmiyor!'); return; }

      const { error } = await sb.auth.updateUser({ password: sifre });
      if (error) { showMsg('sifreMsg', 'error', 'Hata: ' + error.message); }
      else { showMsg('sifreMsg', 'success', '✅ Şifre güncellendi!'); }
    }

    async function cikisYap() {
      await sb.auth.signOut();
      window.location.href = 'index.html';
    }

    function showMsg(id, tip, text) {
      const el = document.getElementById(id);
      el.className = 'msg ' + tip;
      el.textContent = text;
      setTimeout(() => el.className = 'msg', 4000);
    }

    init();
  </script>
</body>
</html>
