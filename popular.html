<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Popüler – AkaToon</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--bg:#0d0d0f;--bg2:#141418;--bg3:#1c1c22;--border:#2a2a35;--red:#e8192c;--text:#e8e8f0;--muted:#888899;--gold:#f5c842;}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}
    a{color:inherit;text-decoration:none;}
    nav{background:rgba(13,13,15,0.96);border-bottom:1px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;}
    .logo{font-family:'Bebas Neue';font-size:26px;}.logo span{color:var(--red);}
    .container{max-width:1280px;margin:0 auto;padding:32px 24px 60px;}
    h1{font-family:'Bebas Neue';font-size:40px;letter-spacing:1px;margin-bottom:8px;}
    .subtitle{color:var(--muted);font-size:14px;margin-bottom:24px;}
    .top3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:32px;}
    .top-card{background:var(--bg2);border-radius:12px;overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:transform .2s;position:relative;}
    .top-card:hover{transform:translateY(-4px);}
    .top-num{position:absolute;top:12px;left:12px;font-family:'Bebas Neue';font-size:40px;color:var(--gold);text-shadow:0 2px 8px rgba(0,0,0,.8);z-index:1;}
    .top-cover{height:280px;background:var(--bg3);display:flex;align-items:flex-end;padding:16px;overflow:hidden;position:relative;}
    .top-cover img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
    .top-cover-overlay{position:absolute;inset:0;background:linear-gradient(transparent 40%,rgba(0,0,0,.8));}
    .top-title{position:relative;z-index:1;font-weight:700;font-size:15px;}
    .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:16px;}
    .card{background:var(--bg2);border-radius:10px;overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:transform .2s,border-color .2s;}
    .card:hover{transform:translateY(-4px);border-color:var(--red);}
    .card-cover{height:220px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:32px;color:rgba(255,255,255,0.3);overflow:hidden;position:relative;}
    .card-cover img{width:100%;height:100%;object-fit:cover;}
    .rank-badge{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.7);color:var(--gold);font-family:'Bebas Neue';font-size:18px;padding:2px 8px;border-radius:6px;}
    .card-info{padding:10px 12px;}
    .card-info h3{font-size:13px;font-weight:600;margin-bottom:4px;}
    .card-rating{color:var(--gold);font-size:11px;}
    .empty{text-align:center;padding:60px;color:var(--muted);grid-column:1/-1;}
    .empty h2{font-family:'Bebas Neue';font-size:32px;margin-bottom:8px;}
    .section-title{font-family:'Bebas Neue';font-size:26px;letter-spacing:1px;margin-bottom:16px;}
    @media(max-width:600px){.top3{grid-template-columns:1fr;}}
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="logo"><span>Aka</span>Toon</a>
    <span style="color:var(--muted);font-size:14px">/ Popüler</span>
  </nav>
  <div class="container">
    <h1>🔥 Popüler</h1>
    <p class="subtitle">En çok sevilen ve okunan içerikler</p>
    <div id="top3Area"></div>
    <div class="section-title">📊 Tüm Sıralama</div>
    <div class="cards-grid" id="grid"><div class="empty"><h2>Yükleniyor...</h2></div></div>
  </div>
  <script>
    const sb=supabase.createClient('https://wxfmatafacdjhiurowut.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind4Zm1hdGFmYWNkamhpdXJvd3V0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMzc0NzgsImV4cCI6MjA5NzcxMzQ3OH0.3uLH8fQ-FrCJ-gdPNEY5Zi56F8fBuVUCdVTrEK7zoZE');
    async function load(){
      const{data}=await sb.from('manga').select('*').order('puan',{ascending:false});
      const grid=document.getElementById('grid');
      if(!data||!data.length){grid.innerHTML='<div class="empty"><h2>😔 Henüz İçerik Yok</h2><p>Yakında eklenecek!</p></div>';return;}
      // TOP 3
      const top3=data.slice(0,3);
      document.getElementById('top3Area').innerHTML=`<div class="top3">${top3.map((m,i)=>`<div class="top-card" onclick="location.href='detay.html?manga=${m.id}'"><span class="top-num">#${i+1}</span><div class="top-cover">${m.kapak_url?`<img src="${m.kapak_url}"/><div class="top-cover-overlay"></div>`:''}<span class="top-title">${m.baslik}</span></div></div>`).join('')}</div>`;
      // TÜMÜ
      grid.innerHTML=data.map((m,i)=>`<div class="card" onclick="location.href='detay.html?manga=${m.id}'"><div class="card-cover">${m.kapak_url?`<img src="${m.kapak_url}" loading="lazy"/>`:'<span>'+m.baslik.substring(0,3).toUpperCase()+'</span>'}<div class="rank-badge">#${i+1}</div></div><div class="card-info"><h3>${m.baslik}</h3>${m.puan?'<div class="card-rating">⭐ '+m.puan+'</div>':''}</div></div>`).join('');
    }
    load();
  </script>
</body>
</html>
