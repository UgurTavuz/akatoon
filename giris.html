<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giriş Yap – AkaToon</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0f; --bg2: #141418; --bg3: #1c1c22;
      --border: #2a2a35; --red: #e8192c; --red-dark: #b01020;
      --text: #e8e8f0; --muted: #888899;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
    }
    nav {
      padding: 16px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
    }
    .logo { font-family: 'Bebas Neue'; font-size: 26px; }
    .logo-aka { color: var(--red); }

    .auth-container {
      flex: 1; display: flex; align-items: center;
      justify-content: center; padding: 40px 16px;
    }
    .auth-box {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 16px; padding: 40px 32px; width: 100%; max-width: 400px;
    }
    .auth-box h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    .auth-box p { color: var(--muted); font-size: 14px; margin-bottom: 28px; }

    .tabs {
      display: flex; gap: 4px; margin-bottom: 28px;
      background: var(--bg3); border-radius: 8px; padding: 4px;
    }
    .tab {
      flex: 1; padding: 8px; border: none; background: none;
      color: var(--muted); font-size: 14px; font-weight: 600;
      border-radius: 6px; cursor: pointer; transition: all .2s;
    }
    .tab.active { background: var(--red); color: #fff; }

    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block; font-size: 13px; font-weight: 600;
      margin-bottom: 6px; color: var(--muted);
    }
    .form-group input {
      width: 100%; background: var(--bg3); border: 1px solid var(--border);
      color: var(--text); padding: 11px 14px; border-radius: 8px;
      font-size: 14px; outline: none; transition: border-color .2s;
    }
    .form-group input:focus { border-color: var(--red); }

    .btn-submit {
      width: 100%; background: var(--red); color: #fff;
      border: none; padding: 13px; border-radius: 8px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      transition: background .2s; margin-top: 8px;
    }
    .btn-submit:hover { background: var(--red-dark); }
    .btn-submit:disabled { opacity: .6; cursor: not-allowed; }

    .msg {
      padding: 10px 14px; border-radius: 8px; font-size: 13px;
      margin-top: 14px; display: none;
    }
    .msg.error { background: rgba(232,25,44,0.1); border: 1px solid rgba(232,25,44,0.3); color: #ff6b7a; }
    .msg.success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #4ade80; }
    .msg.show { display: block; }

    .divider { text-align: center; color: var(--muted); font-size: 12px; margin: 16px 0; }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="logo"><span class="logo-aka">Aka</span>Toon</a>
  </nav>

  <div class="auth-container">
    <div class="auth-box">
      <h1>Hoş Geldin!</h1>
      <p>Türkiye'nin en kaliteli manga platformuna katıl.</p>

      <div class="tabs">
        <button class="tab active" onclick="switchTab('giris')">Giriş Yap</button>
        <button class="tab" onclick="switchTab('kayit')">Kayıt Ol</button>
      </div>

      <!-- GİRİŞ FORMU -->
      <div id="girisForm">
        <div class="form-group">
          <label>E-posta</label>
          <input type="email" id="girisEmail" placeholder="ornek@email.com" />
        </div>
        <div class="form-group">
          <label>Şifre</label>
          <input type="password" id="girisPassword" placeholder="Şifreniz" />
        </div>
        <button class="btn-submit" onclick="girisYap()">Giriş Yap</button>
      </div>

      <!-- KAYIT FORMU -->
      <div id="kayitForm" style="display:none">
        <div class="form-group">
          <label>Kullanıcı Adı</label>
          <input type="text" id="kayitUsername" placeholder="kullaniciadi" />
        </div>
        <div class="form-group">
          <label>E-posta</label>
          <input type="email" id="kayitEmail" placeholder="ornek@email.com" />
        </div>
        <div class="form-group">
          <label>Şifre</label>
          <input type="password" id="kayitPassword" placeholder="En az 6 karakter" />
        </div>
        <button class="btn-submit" onclick="kayitOl()">Kayıt Ol</button>
      </div>

      <div class="msg" id="mesaj"></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://wxfmatafacdjhiurowut.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind4Zm1hdGFmYWNkamhpdXJvd3V0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMzc0NzgsImV4cCI6MjA5NzcxMzQ3OH0.3uLH8fQ-FrCJ-gdPNEY5Zi56F8fBuVUCdVTrEK7zoZE';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('girisForm').style.display = tab === 'giris' ? 'block' : 'none';
      document.getElementById('kayitForm').style.display = tab === 'kayit' ? 'block' : 'none';
      mesajGoster('', '');
    }

    function mesajGoster(tip, text) {
      const el = document.getElementById('mesaj');
      el.className = 'msg';
      if (!text) { el.classList.remove('show'); return; }
      el.classList.add('show', tip);
      el.textContent = text;
    }

    async function girisYap() {
      const email = document.getElementById('girisEmail').value.trim();
      const password = document.getElementById('girisPassword').value;
      if (!email || !password) { mesajGoster('error', 'Tüm alanları doldurun!'); return; }

      const btn = document.querySelector('#girisForm .btn-submit');
      btn.disabled = true; btn.textContent = 'Giriş yapılıyor...';

      const { data, error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        mesajGoster('error', 'E-posta veya şifre hatalı!');
        btn.disabled = false; btn.textContent = 'Giriş Yap';
        return;
      }

      mesajGoster('success', 'Giriş başarılı! Yönlendiriliyorsunuz...');
      setTimeout(() => window.location.href = 'profil.html', 1000);
    }

    async function kayitOl() {
      const username = document.getElementById('kayitUsername').value.trim();
      const email = document.getElementById('kayitEmail').value.trim();
      const password = document.getElementById('kayitPassword').value;

      if (!username || !email || !password) { mesajGoster('error', 'Tüm alanları doldurun!'); return; }
      if (password.length < 6) { mesajGoster('error', 'Şifre en az 6 karakter olmalı!'); return; }

      const btn = document.querySelector('#kayitForm .btn-submit');
      btn.disabled = true; btn.textContent = 'Kayıt yapılıyor...';

      const { data, error } = await sb.auth.signUp({
        email, password,
        options: { data: { username } }
      });

      if (error) {
        mesajGoster('error', 'Kayıt başarısız: ' + error.message);
        btn.disabled = false; btn.textContent = 'Kayıt Ol';
        return;
      }

      mesajGoster('success', 'Kayıt başarılı! E-postanı doğrula ve giriş yap.');
      btn.disabled = false; btn.textContent = 'Kayıt Ol';
    }
  </script>
</body>
</html>
