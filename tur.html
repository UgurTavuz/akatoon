<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tür – AkaToon</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--bg:#0d0d0f;--bg2:#141418;--bg3:#1c1c22;--border:#2a2a35;--red:#e8192c;--text:#e8e8f0;--muted:#888899;--gold:#f5c842;}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}
    a{color:inherit;text-decoration:none;}
    nav{background:rgba(13,13,15,0.96);border-bottom:1px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;}
    .logo{font-family:'Bebas Neue';font-size:26px;}.logo span{color:var(--red);}
    .container{max-width:1280px;margin:0 auto;padding:32px 24px 60px;}
    .page-header{margin-bottom:28px;}
    .page-header h1{font-family:'Bebas Neue';font-size:40px;letter-spacing:1px;margin-bottom:8px;}
    .page-header p{color:var(--muted);font-size:14px;}
    .tur-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px;}
    .tur-tab{background:var(--bg2);border:1px solid var(--border);color:var(--muted);padding:7px 16px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;text-decoration:none;}
    .tur-tab:hover,.tur-tab.active{background:var(--red);border-color:var(--red);color:#fff;}
    .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:16px;}
    .card{background:var(--bg2);border-radius:10px;overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s;}
    .card:hover{transform:translateY(-4px);border-color:var(--red);box-shadow:0 8px 30px rgba(232,25,44,0.15);}
    .card-cover{height:240px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:36px;color:rgba(255,255,255,0.3);overflow:hidden;position:relative;}
    .card-cover img{width:100%;height:100%;object-fit:cover;}
    .card-badge{position:absolute;top:8px;right:8px;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;}
    .card-info{padding:12px;}
    .card-info h3{font-size:14px;font-weight:600;margin-bottom:6px;}
    .card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
    .genre-tag{background:rgba(232,25,44,0.12);color:var(--red);font-size:11px;padding:2px 8px;border-radius:4px;}
    .card-rating{color:var(--gold);font-size:11px;}
    .empty{text-align:center;padding:60px;color:var(--muted);}
    .empty h2{font-family:'Bebas Neue';font-size:32px;margin-bottom:8px;}
    .filtre-bar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
    .filtre-bar select{background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:8px;font-size:13px;outline:none;}
    .sonuc-say{color:var(--muted);font-size:13px;}
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="logo"><span>Aka</span>Toon</a>
    <span style="color:var(--muted);font-size:14px" id="navBaslik">/ Tür</span>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1 id="pageTitle">🎭 Tüm Türler</h1>
      <p id="pageDesc">Türe göre manga ve webtoon keşfet</p>
    </div>

    <!-- TÜR SEKMELERİ -->
    <div class="tur-tabs">
      <a href="tur.html" class="tur-tab">🌟 Tümü</a>
      <a href="tur.html?tur=Aksiyon" class="tur-tab">⚔️ Aksiyon</a>
      <a href="tur.html?tur=Romantik" class="tur-tab">💕 Romantik</a>
      <a href="tur.html?tur=Fantastik" class="tur-tab">🔮 Fantastik</a>
      <a href="tur.html?tur=Korku" class="tur-tab">👻 Korku</a>
      <a href="tur.html?tur=Komedi" class="tur-tab">😂 Komedi</a>
      <a href="tur.html?tur=Dram" class="tur-tab">🎭 Dram</a>
      <a href="tur.html?tur=Shounen" class="tur-tab">🔥 Shounen</a>
      <a href="tur.html?tur=Shoujo" class="tur-tab">🌸 Shoujo</a>
      <a href="tur.html?tur=Seinen" class="tur-tab">💀 Seinen</a>
      <a href="tur.html?tur=Isekai" class="tur-tab">🌀 Isekai</a>
      <a href="tur.html?tur=Macera" class="tur-tab">🗺️ Macera</a>
      <a href="tur.html?tur=Psikolojik" class="tur-tab">🧠 Psikolojik</a>
      <a href="tur.html?tur=Doğaüstü" class="tur-tab">✨ Doğaüstü</a>
      <a href="tur.html?tur=Spor" class="tur-tab">⚽ Spor</a>
      <a href="tur.html?tur=Tarihi" class="tur-tab">🏯 Tarihi</a>
      <a href="tur.html?tur=Bilim Kurgu" class="tur-tab">🚀 Bilim Kurgu</a>
      <a href="tur.html?tur=Vampir" class="tur-tab">🧛 Vampir</a>
      <a href="tur.html?tur=Zombi" class="tur-tab">🧟 Zombi</a>
      <a href="tur.html?tur=İntikam" class="tur-tab">😤 İntikam</a>
    </div>

    <!-- FİLTRE -->
    <div class="filtre-bar">
      <select id="siralaSelect" onchange="load()">
        <option value="puan">⭐ Puana Göre</option>
        <option value="yeni">🆕 En Yeni</option>
        <option value="isim">🔤 A-Z</option>
      </select>
      <select id="turSelect" onchange="load()">
        <option value="">Tüm Türler</option>
        <option value="manga">📕 Manga</option>
        <option value="webtoon">📱 Webtoon</option>
        <option value="manhua">🐉 Manhua</option>
        <option value="manhwa">🎭 Manhwa</option>
      </select>
      <span class="sonuc-say" id="sonucSay"></span>
    </div>

    <div class="cards-grid" id="cardsGrid">
      <div class="empty" style="grid-column:1/-1">Yükleniyor...</div>
    </div>
  </div>

  <script>
    const SUPABASE_URL='https://wxfmatafacdjhiurowut.supabase.co';
    const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind4Zm1hdGFmYWNkamhpdXJvd3V0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMzc0NzgsImV4cCI6MjA5NzcxMzQ3OH0.3uLH8fQ-FrCJ-gdPNEY5Zi56F8fBuVUCdVTrEK7zoZE';
    const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON);
    const params=new URLSearchParams(window.location.search);
    const kategori=params.get('tur')||'';

    // Aktif sekmeyi işaretle
    document.querySelectorAll('.tur-tab').forEach(t=>{
      const href=t.getAttribute('href');
      if(kategori&&href.includes(encodeURIComponent(kategori))){t.classList.add('active');}
      else if(!kategori&&href==='tur.html'){t.classList.add('active');}
    });

    // Başlık
    if(kategori){
      document.getElementById('pageTitle').textContent='🎭 '+kategori;
      document.getElementById('pageDesc').textContent=kategori+' türündeki tüm manga ve webtoonlar';
      document.getElementById('navBaslik').textContent='/ '+kategori;
      document.title=kategori+' – AkaToon';
    }

    async function load(){
      const siralama=document.getElementById('siralaSelect').value;
      const turFiltre=document.getElementById('turSelect').value;

      let q=sb.from('manga').select('*');
      if(kategori) q=q.ilike('kategori','%'+kategori+'%');
      if(turFiltre) q=q.eq('tur',turFiltre);
      if(siralama==='puan') q=q.order('puan',{ascending:false});
      else if(siralama==='yeni') q=q.order('created_at',{ascending:false});
      else if(siralama==='isim') q=q.order('baslik',{ascending:true});

      const{data}=await q;
      const grid=document.getElementById('cardsGrid');

      if(!data||!data.length){
        grid.innerHTML=`<div class="empty" style="grid-column:1/-1">
          <h2>😔 Henüz İçerik Yok</h2>
          <p>${kategori?'"'+kategori+'" türünde':'Bu kategoride'} henüz içerik eklenmedi.<br>Yakında eklenecek!</p>
        </div>`;
        document.getElementById('sonucSay').textContent='';
        return;
      }

      document.getElementById('sonucSay').textContent=data.length+' içerik bulundu';
      grid.innerHTML=data.map(m=>`
        <div class="card" onclick="window.location.href='detay.html?manga=${m.id}'">
          <div class="card-cover">
            ${m.kapak_url?`<img src="${m.kapak_url}" loading="lazy" />`:`<span>${m.baslik.substring(0,3).toUpperCase()}</span>`}
            ${m.durum==='devam'?'<div class="card-badge">GÜNCEL</div>':m.durum==='tamamlandi'?'<div class="card-badge" style="background:#6060ff">BİTTİ</div>':''}
          </div>
          <div class="card-info">
            <h3>${m.baslik}</h3>
            <div class="card-meta">
              ${m.kategori?`<span class="genre-tag">${m.kategori.split(',')[0].trim()}</span>`:''}
              ${m.puan?`<span class="card-rating">⭐ ${m.puan}</span>`:''}
            </div>
          </div>
        </div>`).join('');
    }

    load();
  </script>
</body>
</html>
